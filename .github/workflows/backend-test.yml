name: BE Testing
run-name: ${{github.actor}} trigger tests for BE
on:
  pull_request:
    branches:
      - master
    paths:
      - "docs/**"
      - "internal/**"
      - "cmd/**"
      - "data/testing/**"
      - "database/**"
      - "build/**"
      - "Makefile"
      - "go.*"
      - ".github/workflows/backend-test.yml"
  push:
    branches:
      - master
    paths:
      - "internal/**"
      - "cmd/**"
      - "data/testing/**"
      - "database/**"
      - "build/**"
      - "Makefile"
      - "go.*"
      - ".github/workflows/backend-test.yml"

env:
  GO_VERSION: 1.26.1

jobs:
  Execute-Backend-Testcase:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Set up Golang environment
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            go.sum
            go.mod
      - name: Go fix check
        run: |
          go fix ./...
          git diff --exit-code || (echo "go fix produced changes — please run 'go fix ./...' and commit" && exit 1)
      - name: Go fmt check
        run: |
          gofmt -l . | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out || (echo "gofmt found unformatted files — please run 'gofmt -w .' and commit" && exit 1)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Test
        working-directory: "."
        run: make test
